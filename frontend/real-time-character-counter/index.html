<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Onyx wizard">
    <title>Real Time Character Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h2 class="title-box"> Real Time Character Counter</h2>
        <textarea class="input-area" id="textarea" placeholder="Please write something?" maxlength="50"></textarea>
        <div class="text-container">
            <p>Total Character <span class="total-character-counter" id="character-counter"></span></p>
            <p>Remaining <span class="character-counter" id="remain-char"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
